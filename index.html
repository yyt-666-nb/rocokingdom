<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>洛克王国世界配队器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">洛克王国世界</p>
          <h1>配队器</h1>
        </div>
        <div class="team-summary">
          <span id="teamCount">0/6</span>
          <button id="viewLineup" type="button" hidden>查看阵容</button>
          <button id="clearTeam" type="button">清空</button>
        </div>
      </header>

      <section class="team" aria-label="当前配队">
        <h2>当前配队</h2>
        <div id="teamList" class="team-list"></div>
      </section>

      <section class="dex" aria-label="宠物列表">
        <div class="dex-head">
          <h2>全部宠物</h2>
          <div class="dex-tools">
            <input id="petSearch" type="search" placeholder="搜索名称或属性" autocomplete="off" />
            <span id="petTotal"></span>
          </div>
        </div>
        <div id="petGrid" class="pet-grid"></div>
      </section>
    </main>

    <script src="./data/pets-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
